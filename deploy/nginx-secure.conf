server {
    listen 80;
    server_name secure.imagineqira.com;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Landing page (static)
    root /var/www/bry-nfet-sx;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    # Subpages (clean URLs)
    location = /review {
        try_files /review.html =404;
    }

    location = /security {
        try_files /security.html =404;
    }

    location = /contact {
        try_files /contact.html =404;
    }

    location = /verify {
        try_files /verify.html =404;
    }

    location = /site-integrity.json {
        try_files /site-integrity.json =404;
        add_header Content-Type "application/json";
        add_header Access-Control-Allow-Origin "*";
    }

    # Public decryption challenge (static page + bundle files)
    location = /challenge {
        try_files /challenge.html =404;
    }
    location /challenge/ {
        try_files $uri =404;
        add_header Access-Control-Allow-Origin "*";
    }

    # Browser vault — static client-side encryption tool with strict CSP.
    # connect-src 'none' is the kill-switch: the page is not allowed to
    # make any network requests after load. Visitors can verify in
    # DevTools that an encrypt/decrypt round-trip produces zero traffic.
    location = /chat {
        try_files /chat/index.html =404;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; form-action 'none'; base-uri 'none'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
    }
    location /chat/ {
        try_files $uri $uri/index.html =404;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; form-action 'none'; base-uri 'none'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    # SEO files
    location = /robots.txt {
        try_files /robots.txt =404;
    }

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
        add_header Content-Type "application/xml";
    }

    # Static landing assets
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Streamlit dashboard at /app
    location /app {
        rewrite ^/app$ /app/ redirect;
    }
    location /app/ {
        proxy_pass http://127.0.0.1:8507/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Streamlit internal endpoints
    location /_stcore/ {
        proxy_pass http://127.0.0.1:8507/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8507/static/;
        proxy_set_header Host $host;
    }

    location /vendor/ {
        proxy_pass http://127.0.0.1:8507/vendor/;
        proxy_set_header Host $host;
    }

    location /component/ {
        proxy_pass http://127.0.0.1:8507/component/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # API routes
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8002/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8002/openapi.json;
        proxy_set_header Host $host;
    }
}
