# nginx vhost for secure.imagineqira.com — mirrors the LIVE config
# on the production server (synced 2026-06-10).
#
# Notes:
#  - try_files puts $uri.html BEFORE $uri/ so /downloads serves the
#    downloads.html page instead of 301-ing into the downloads/
#    binaries directory.
#  - /downloads/ and /challenge/ also serve their pages directly:
#    browsers cached the old 301-to-403 permanent redirects.
#  - HTML is no-cache so stale pages/redirects can't stick.
#  - No sub_filter/GA injection here: analytics are inline in the
#    signed HTML so served bytes match site-integrity.json.

server {
    server_name secure.imagineqira.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    root /var/www/secure-imagineqira;
    index index.html;

    location ~* \.(js|css|svg|woff2|woff|ttf|png|jpg|jpeg|webp|ico)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }

    location = /app/ {
        return 302 /vault/;
    }
    location = /app {
        return 302 /vault/;
    }
    location /app/ {
        return 302 /vault/;
    }

    # Cached-301 rescue: until 2026-06-10, /downloads and /challenge
    # 301d into their sibling directories (no index file -> 403), and
    # browsers cache permanent redirects. Serving the pages at the
    # directory URLs too means those cached redirects land on the
    # real page instead of a 403.
    location = /downloads/ {
        try_files /downloads.html =404;
    }
    location = /challenge/ {
        try_files /challenge.html =404;
    }

    # Signed-site hygiene: HTML must always revalidate so visitors
    # never hold stale pages (or stale redirects) that drift from
    # site-integrity.json.
    location ~* \.html$ {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/pti.imagineqira.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/pti.imagineqira.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = secure.imagineqira.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name secure.imagineqira.com;
    return 404; # managed by Certbot


}