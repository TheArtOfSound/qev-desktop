name: QEV cross-platform build

# Produces installers for macOS and Windows from the same Tauri
# codebase under tauri-app/. Triggered manually from the Actions tab
# or automatically on pushes to tags like v0.28.1.
#
# Artifacts land in the Actions run's Artifacts panel as:
#   - QEV_<version>_aarch64.dmg        (macOS Apple Silicon)
#   - QEV_<version>_x64.dmg            (macOS Intel — optional)
#   - QEV_<version>_x64_en-US.msi      (Windows installer)
#   - QEV_<version>_x64-setup.exe      (Windows portable installer)
#
# None of these are signed yet. Code signing requires:
#   - Apple: Developer ID cert + APP_STORE_CONNECT credentials
#     in repo secrets (APPLE_SIGNING_IDENTITY, APPLE_CERTIFICATE,
#     APPLE_CERTIFICATE_PASSWORD, APPLE_ID, APPLE_TEAM_ID,
#     APPLE_PASSWORD).
#   - Windows: Authenticode code-signing cert (EV preferred) in
#     repo secrets (WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD).
#
# For the FIRST ship, unsigned is fine — users can right-click-Open
# on Mac and click "More Info" → "Run Anyway" on Windows SmartScreen.
# Once sales happen, enrol in both signing programs and fill in the
# secrets below.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (manual run only)"
        required: false
        default: "manual"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle: app,dmg
            label: macos-arm64
          # macos-13 (Intel) runners are being retired by GitHub;
          # re-add once we actually need an Intel Mac installer.
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi,nsis
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: tauri-app/src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri-app/src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('tauri-app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build QEV
        run: cargo tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}
        env:
          # macOS: "-" = ad-hoc sign, no cert import. Once we have a
          # real Apple Developer ID, set APPLE_SIGNING_IDENTITY +
          # APPLE_CERTIFICATE + APPLE_CERTIFICATE_PASSWORD in repo
          # secrets and this single line becomes a conditional.
          APPLE_SIGNING_IDENTITY: "-"

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: qev-${{ matrix.label }}
          path: |
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          retention-days: 30
          if-no-files-found: warn

  # ────────────────────── ANDROID APK BUILD ──────────────────────
  #
  # Runs on Ubuntu with GitHub's pre-installed Android SDK + NDK.
  # Cross-compiles the Rust crate to aarch64-linux-android (the only
  # Android ABI we ship for sideload at this point — Android x86 and
  # older arm are ~0.5% of active devices).
  #
  # The generated Android Gradle project lives at
  # tauri-app/src-tauri/gen/android/ and IS committed to the repo.
  # CI does NOT re-run `cargo tauri android init` — that would
  # overwrite our custom AndroidManifest.xml + network_security_config
  # + data_extraction_rules + strings with Tauri defaults. We want
  # the committed project state as-is.
  #
  # The APK is signed with the workflow's debug keystore generated
  # at runtime (stable enough for sideload testing but NOT Play-Store
  # install-compatible). Production signing will be a follow-up once
  # we have a real upload keystore backed up in multiple places.

  android:
    name: Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tauri-app/src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-36
            build-tools;36.0.0
            ndk;27.2.12479018

      - name: Export Android env vars
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri-app/src-tauri/target
          key: android-aarch64-cargo-${{ hashFiles('tauri-app/src-tauri/Cargo.lock') }}
          restore-keys: |
            android-aarch64-cargo-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build APK (aarch64, release)
        # Use --target aarch64 for a single-ABI build; it's ~10 MB
        # instead of the ~40 MB universal. If we later want Google
        # Play listing, switch to a universal build with split APKs.
        run: cargo tauri android build --apk --target aarch64
        env:
          # Match the desktop workflow: ad-hoc sign Mac (not relevant
          # here but kept consistent) and do not pull a release
          # signing keystore — CI produces an unsigned APK and we
          # debug-sign it below.
          APPLE_SIGNING_IDENTITY: "-"

      - name: Debug-sign APK with workflow-local keystore
        # Generate a temp debug keystore, zipalign, sign with
        # apksigner. This produces an installable APK for sideload
        # testing. Production builds will replace this step with one
        # that pulls a keystore from GitHub secrets.
        run: |
          cd gen/android/app/build/outputs/apk/universal/release
          UNSIGNED=$(ls app-universal-release-unsigned.apk)
          BT=$ANDROID_HOME/build-tools/36.0.0
          keytool -genkeypair -v \
            -keystore /tmp/qev-debug.keystore \
            -storepass android -keypass android \
            -alias qevdebug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=QEV Debug, O=Qira LLC, C=US"
          $BT/zipalign -p -v 4 "$UNSIGNED" app-aligned.apk
          $BT/apksigner sign \
            --ks /tmp/qev-debug.keystore \
            --ks-pass pass:android \
            --ks-key-alias qevdebug \
            --key-pass pass:android \
            --out QEV_${{ github.sha }}_android.apk \
            app-aligned.apk
          $BT/apksigner verify --verbose QEV_${{ github.sha }}_android.apk
          ls -lh QEV_${{ github.sha }}_android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qev-android-aarch64
          path: tauri-app/src-tauri/gen/android/app/build/outputs/apk/universal/release/QEV_${{ github.sha }}_android.apk
          retention-days: 30
          if-no-files-found: warn
