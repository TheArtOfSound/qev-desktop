name: QEV cross-platform build

# Produces installers for macOS and Windows from the same Tauri
# codebase under tauri-app/. Triggered manually from the Actions tab
# or automatically on pushes to tags like v0.28.1.
#
# Artifacts land in the Actions run's Artifacts panel as:
#   - QEV_<version>_aarch64.dmg        (macOS Apple Silicon)
#   - QEV_<version>_x64.dmg            (macOS Intel — optional)
#   - QEV_<version>_x64_en-US.msi      (Windows installer)
#   - QEV_<version>_x64-setup.exe      (Windows portable installer)
#
# None of these are signed yet. Code signing requires:
#   - Apple: Developer ID cert + APP_STORE_CONNECT credentials
#     in repo secrets (APPLE_SIGNING_IDENTITY, APPLE_CERTIFICATE,
#     APPLE_CERTIFICATE_PASSWORD, APPLE_ID, APPLE_TEAM_ID,
#     APPLE_PASSWORD).
#   - Windows: Authenticode code-signing cert (EV preferred) in
#     repo secrets (WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD).
#
# For the FIRST ship, unsigned is fine — users can right-click-Open
# on Mac and click "More Info" → "Run Anyway" on Windows SmartScreen.
# Once sales happen, enrol in both signing programs and fill in the
# secrets below.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (manual run only)"
        required: false
        default: "manual"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle: app,dmg
            label: macos-arm64
          - platform: macos-13   # Intel runner for x86_64 Mac
            target: x86_64-apple-darwin
            bundle: app,dmg
            label: macos-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi,nsis
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: tauri-app/src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri-app/src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('tauri-app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build QEV
        run: cargo tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}
        env:
          # macOS signing (set in repo secrets; empty = unsigned ad-hoc)
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # Windows signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: qev-${{ matrix.label }}
          path: |
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          retention-days: 30
          if-no-files-found: warn
