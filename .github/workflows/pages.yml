name: Deploy QEV Pages

# Single source of truth for the GitHub Pages site:
#   /          — inline QEV vault app (repo-root index.html)
#   /app/      — guide + tool SPA, built fresh from proof-lock-web/
#   /docs/     — markdown docs + redirect for old /docs/ SPA links
#   /assets/   — shared static assets
# (An earlier setup had two workflows racing to deploy different
# payloads to the same Pages environment; whichever ran last won,
# which intermittently broke …/#/tool links.)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: qev-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: proof-lock-web/package-lock.json

      - name: Build guide app
        working-directory: proof-lock-web
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html _site/index.html
          cp 404.html _site/404.html
          cp -R docs _site/docs
          cp -R proof-lock-web/dist _site/app
          if [ -d assets ]; then cp -R assets _site/assets; fi
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
