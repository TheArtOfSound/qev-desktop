<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180" role="img" aria-labelledby="title desc">
  <title id="title">QEV Encryption and Decryption Flow</title>
  <desc id="desc">Step by step visual diagram showing QEV encryption, the vault file, and decryption without text overlap.</desc>
  <rect width="1800" height="1180" fill="#ffffff"/>
  <style>
    text{font-family:Inter,Arial,sans-serif;fill:#111827}
    .title{font-size:52px;font-weight:900}.subtitle{font-size:28px;font-weight:800;fill:#4b5563}.section{font-size:34px;font-weight:900}.stepTitle{font-size:26px;font-weight:850}.stepBody{font-size:18px;fill:#374151}.stepBodySmall{font-size:17px;fill:#374151}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:24px}.monoSmall{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:21px}.badge{font-size:22px;font-weight:900;fill:#ffffff}.callout{font-size:20px;font-weight:850}.summary{font-size:28px;font-weight:850}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M0,0 L10,6 L0,12 Z" fill="#1d4ed8"/></marker></defs>
  <text x="900" y="60" text-anchor="middle" class="title">QEV Encryption and Decryption Flow</text>
  <text x="900" y="100" text-anchor="middle" class="subtitle">BRY-NFET-SX-VAULT-V2</text>
  <line x1="570" y1="120" x2="570" y2="1000" stroke="#1d4ed8" stroke-width="2" stroke-dasharray="8 10" opacity="0.35"/>
  <line x1="1230" y1="120" x2="1230" y2="1000" stroke="#1d4ed8" stroke-width="2" stroke-dasharray="8 10" opacity="0.35"/>
  <text x="290" y="145" text-anchor="middle" class="section">ENCRYPTION</text><text x="900" y="145" text-anchor="middle" class="section">QEV VAULT FILE</text><text x="1510" y="145" text-anchor="middle" class="section">DECRYPTION</text>

  <g id="enc">
    <rect x="50" y="170" width="480" height="68" rx="12" fill="#f8fafc" stroke="#1f2937" stroke-width="2"/><circle cx="90" cy="204" r="18" fill="#1d4ed8"/><text x="90" y="211" text-anchor="middle" class="badge">1</text><text x="130" y="198" class="stepTitle">Plaintext message</text><text x="130" y="222" class="stepBody">important proof</text>
    <rect x="50" y="260" width="480" height="68" rx="12" fill="#f8fafc" stroke="#1f2937" stroke-width="2"/><circle cx="90" cy="294" r="18" fill="#1d4ed8"/><text x="90" y="301" text-anchor="middle" class="badge">2</text><text x="130" y="288" class="stepTitle">User phrase</text><text x="130" y="312" class="stepBody">my long secret phrase</text>
    <rect x="50" y="350" width="480" height="88" rx="12" fill="#f8fafc" stroke="#1f2937" stroke-width="2"/><circle cx="90" cy="385" r="18" fill="#1d4ed8"/><text x="90" y="392" text-anchor="middle" class="badge">3</text><text x="130" y="380" class="stepTitle">Argon2id</text><text x="130" y="404" class="stepBody">phrase + salt + opslimit + memlimit</text><text x="130" y="427" class="stepBody">→ derive wrapKey</text>
    <rect x="50" y="460" width="480" height="130" rx="12" fill="#f8fafc" stroke="#1f2937" stroke-width="2"/><circle cx="90" cy="495" r="18" fill="#1d4ed8"/><text x="90" y="502" text-anchor="middle" class="badge">4</text><text x="130" y="490" class="stepTitle">Generate randomness</text><text x="130" y="518" class="stepBodySmall">• 16-byte salt</text><text x="130" y="542" class="stepBodySmall">• 24-byte wrap nonce</text><text x="130" y="566" class="stepBodySmall">• 24-byte content nonce</text><text x="130" y="590" class="stepBodySmall">• 32-byte random vaultKey</text>
    <rect x="50" y="612" width="480" height="112" rx="12" fill="#f8fafc" stroke="#1f2937" stroke-width="2"/><circle cx="90" cy="648" r="18" fill="#1d4ed8"/><text x="90" y="655" text-anchor="middle" class="badge">5</text><text x="130" y="642" class="stepTitle">Build vault skeleton</text><text x="130" y="670" class="stepBody">schema · version · created_at · mode</text><text x="130" y="694" class="stepBody">kdf · wrap · content</text>
    <rect x="50" y="746" width="480" height="74" rx="12" fill="#f8fafc" stroke="#1f2937" stroke-width="2"/><circle cx="90" cy="783" r="18" fill="#1d4ed8"/><text x="90" y="790" text-anchor="middle" class="badge">6</text><text x="130" y="778" class="stepTitle">Build AAD</text><text x="130" y="803" class="stepBody">canonical sorted JSON metadata</text>
    <rect x="50" y="842" width="480" height="98" rx="12" fill="#f8fafc" stroke="#1f2937" stroke-width="2"/><circle cx="90" cy="879" r="18" fill="#1d4ed8"/><text x="90" y="886" text-anchor="middle" class="badge">7</text><text x="130" y="874" class="stepTitle">Wrap layer</text><text x="130" y="900" class="stepBody">XChaCha20-Poly1305</text><text x="130" y="924" class="stepBody">encrypt(vaultKey, AAD, wrapNonce, wrapKey)</text>
    <rect x="50" y="962" width="480" height="98" rx="12" fill="#f8fafc" stroke="#1f2937" stroke-width="2"/><circle cx="90" cy="999" r="18" fill="#1d4ed8"/><text x="90" y="1006" text-anchor="middle" class="badge">8</text><text x="130" y="994" class="stepTitle">Content layer</text><text x="130" y="1020" class="stepBody">XChaCha20-Poly1305</text><text x="130" y="1044" class="stepBody">encrypt(plaintext, AAD, contentNonce, vaultKey)</text>
  </g>
  <g stroke="#1d4ed8" stroke-width="4" marker-end="url(#arrow)"><line x1="290" y1="238" x2="290" y2="260"/><line x1="290" y1="328" x2="290" y2="350"/><line x1="290" y1="438" x2="290" y2="460"/><line x1="290" y1="590" x2="290" y2="612"/><line x1="290" y1="724" x2="290" y2="746"/><line x1="290" y1="820" x2="290" y2="842"/><line x1="290" y1="940" x2="290" y2="962"/><line x1="530" y1="891" x2="610" y2="891"/><line x1="530" y1="1011" x2="610" y2="1011"/></g>

  <path d="M650 190 H1080 L1160 270 V860 H650 Z" fill="#ffffff" stroke="#111827" stroke-width="2.5"/><path d="M1080 190 V270 H1160" fill="none" stroke="#111827" stroke-width="2.5"/><rect x="675" y="214" width="112" height="48" rx="8" fill="#1d4ed8"/><text x="731" y="246" text-anchor="middle" class="badge" style="font-size:28px">.vault</text>
  <text x="685" y="310" class="mono">{</text><text x="715" y="350" class="mono">schema: "BRY-NFET-SX-VAULT-V2",</text><text x="715" y="388" class="mono">version,</text><text x="715" y="426" class="mono">created_at,</text><text x="715" y="464" class="mono">mode,</text><text x="715" y="512" class="mono">kdf: {</text><text x="760" y="548" class="monoSmall">algorithm: "argon2id",</text><text x="760" y="580" class="monoSmall">opslimit, memlimit, salt</text><text x="715" y="614" class="mono">},</text><text x="715" y="662" class="mono">wrap: {</text><text x="760" y="698" class="monoSmall">algorithm: "XChaCha20-Poly1305",</text><text x="760" y="730" class="monoSmall">nonce, wrapped_key</text><text x="715" y="764" class="mono">},</text><text x="715" y="812" class="mono">content: {</text><text x="760" y="848" class="monoSmall">algorithm: "XChaCha20-Poly1305",</text><text x="760" y="880" class="monoSmall">nonce, ciphertext</text><text x="715" y="914" class="mono">}</text><text x="685" y="950" class="mono">}</text>
  <rect x="675" y="972" width="460" height="92" rx="14" fill="#f8fbff" stroke="#1d4ed8" stroke-width="2"/><text x="705" y="1011" class="callout">AAD</text><text x="775" y="1011" class="callout">protects metadata too</text><text x="752" y="1038" class="stepBody">changing protected labels or nonces breaks decryption</text>

  <g id="dec">
    <rect x="1270" y="170" width="480" height="68" rx="12" fill="#f8fafc" stroke="#1f2937" stroke-width="2"/><circle cx="1310" cy="204" r="18" fill="#1d4ed8"/><text x="1310" y="211" text-anchor="middle" class="badge">1</text><text x="1350" y="198" class="stepTitle">Load .vault JSON</text>
    <rect x="1270" y="260" width="480" height="100" rx="12" fill="#f8fafc" stroke="#1f2937" stroke-width="2"/><circle cx="1310" cy="295" r="18" fill="#1d4ed8"/><text x="1310" y="302" text-anchor="middle" class="badge">2</text><text x="1350" y="289" class="stepTitle">Validate vault schema</text><text x="1350" y="317" class="stepBody">schema = BRY-NFET-SX-VAULT-V2</text><text x="1350" y="341" class="stepBody">required fields, algorithms, lengths valid</text>
    <rect x="1270" y="382" width="480" height="88" rx="12" fill="#f8fafc" stroke="#1f2937" stroke-width="2"/><circle cx="1310" cy="417" r="18" fill="#1d4ed8"/><text x="1310" y="424" text-anchor="middle" class="badge">3</text><text x="1350" y="412" class="stepTitle">Decode stored fields</text><text x="1350" y="440" class="stepBody">salt, nonces, wrapped_key, ciphertext</text>
    <rect x="1270" y="492" width="480" height="88" rx="12" fill="#f8fafc" stroke="#1f2937" stroke-width="2"/><circle cx="1310" cy="527" r="18" fill="#1d4ed8"/><text x="1310" y="534" text-anchor="middle" class="badge">4</text><text x="1350" y="522" class="stepTitle">Rebuild wrapKey</text><text x="1350" y="550" class="stepBody">Argon2id(phrase, salt, opslimit, memlimit)</text>
    <rect x="1270" y="602" width="480" height="74" rx="12" fill="#f8fafc" stroke="#1f2937" stroke-width="2"/><circle cx="1310" cy="639" r="18" fill="#1d4ed8"/><text x="1310" y="646" text-anchor="middle" class="badge">5</text><text x="1350" y="634" class="stepTitle">Rebuild AAD</text><text x="1350" y="659" class="stepBody">same canonical metadata</text>
    <rect x="1270" y="698" width="480" height="98" rx="12" fill="#f8fafc" stroke="#1f2937" stroke-width="2"/><circle cx="1310" cy="735" r="18" fill="#1d4ed8"/><text x="1310" y="742" text-anchor="middle" class="badge">6</text><text x="1350" y="730" class="stepTitle">Unwrap vaultKey</text><text x="1350" y="756" class="stepBody">decrypt(wrapped_key, AAD, wrapNonce, wrapKey)</text>
    <rect x="1270" y="818" width="480" height="98" rx="12" fill="#f8fafc" stroke="#1f2937" stroke-width="2"/><circle cx="1310" cy="855" r="18" fill="#1d4ed8"/><text x="1310" y="862" text-anchor="middle" class="badge">7</text><text x="1350" y="850" class="stepTitle">Decrypt content</text><text x="1350" y="876" class="stepBody">decrypt(ciphertext, AAD, contentNonce, vaultKey)</text>
    <rect x="1270" y="938" width="480" height="74" rx="12" fill="#f8fafc" stroke="#1f2937" stroke-width="2"/><circle cx="1310" cy="975" r="18" fill="#1d4ed8"/><text x="1310" y="982" text-anchor="middle" class="badge">8</text><text x="1350" y="970" class="stepTitle">UTF-8 decode plaintext</text>
    <rect x="1270" y="1030" width="480" height="46" rx="12" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/><text x="1300" y="1060" style="font-size:28px;fill:#15803d">✓</text><text x="1360" y="1060" style="font-size:28px;font-weight:900;fill:#15803d">important proof</text>
  </g>
  <g stroke="#1d4ed8" stroke-width="4" marker-end="url(#arrow)"><line x1="1510" y1="238" x2="1510" y2="260"/><line x1="1510" y1="360" x2="1510" y2="382"/><line x1="1510" y1="470" x2="1510" y2="492"/><line x1="1510" y1="580" x2="1510" y2="602"/><line x1="1510" y1="676" x2="1510" y2="698"/><line x1="1510" y1="796" x2="1510" y2="818"/><line x1="1510" y1="916" x2="1510" y2="938"/><line x1="1510" y1="1012" x2="1510" y2="1030"/></g>
  <rect x="1582" y="718" width="180" height="74" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="2"/><text x="1600" y="748" style="font-size:18px;font-weight:850;fill:#dc2626">If this fails:</text><text x="1600" y="772" style="font-size:18px;font-weight:850;fill:#dc2626">wrong phrase or</text><text x="1600" y="796" style="font-size:18px;font-weight:850;fill:#dc2626">tampered vault</text>
  <rect x="1582" y="838" width="180" height="64" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="2"/><text x="1600" y="868" style="font-size:18px;font-weight:850;fill:#dc2626">If this fails:</text><text x="1600" y="892" style="font-size:18px;font-weight:850;fill:#dc2626">content tampered</text>
  <rect x="160" y="1098" width="1480" height="56" rx="16" fill="#ffffff" stroke="#1d4ed8" stroke-width="2.5"/><text x="900" y="1135" text-anchor="middle" class="summary">Two-lock vault: phrase → wrapKey → vaultKey → message. AAD binds the vault metadata into the seal.</text>
</svg>
