<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860" role="img" aria-labelledby="title desc">
  <title id="title">QEV Encryption and Decryption Overview</title>
  <desc id="desc">A compact overview of QEV encryption, the vault file, and decryption designed for the public landing page.</desc>
  <rect width="1600" height="860" fill="#ffffff"/>
  <style>
    text{font-family:Inter,Arial,sans-serif;fill:#111827}
    .title{font-size:38px;font-weight:900}
    .sub{font-size:20px;font-weight:800;fill:#5b6470}
    .section{font-size:26px;font-weight:900}
    .boxTitle{font-size:19px;font-weight:850}
    .boxText{font-size:14px;fill:#4b5563}
    .badge{font-size:14px;font-weight:900;fill:#fff}
    .code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:16px}
    .note{font-size:16px;font-weight:800}
    .summary{font-size:20px;font-weight:850}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L8,5 L0,10 Z" fill="#2563eb"/></marker>
  </defs>

  <text x="800" y="46" text-anchor="middle" class="title">QEV Encryption and Decryption Overview</text>
  <text x="800" y="74" text-anchor="middle" class="sub">BRY-NFET-SX-VAULT-V2</text>

  <line x1="518" y1="100" x2="518" y2="720" stroke="#c8d6fb" stroke-width="2" stroke-dasharray="6 8"/>
  <line x1="1082" y1="100" x2="1082" y2="720" stroke="#c8d6fb" stroke-width="2" stroke-dasharray="6 8"/>

  <text x="265" y="115" text-anchor="middle" class="section">ENCRYPTION</text>
  <text x="800" y="115" text-anchor="middle" class="section">VAULT FILE</text>
  <text x="1335" y="115" text-anchor="middle" class="section">DECRYPTION</text>

  <!-- Left boxes -->
  <g>
    <rect x="40" y="145" width="450" height="68" rx="10" fill="#f8fafc" stroke="#1f2937"/>
    <circle cx="74" cy="179" r="15" fill="#2563eb"/><text x="74" y="184" text-anchor="middle" class="badge">1</text>
    <text x="104" y="174" class="boxTitle">Record + passphrase</text>
    <text x="104" y="194" class="boxText">Start with plaintext and a phrase you keep.</text>

    <rect x="40" y="233" width="450" height="82" rx="10" fill="#f8fafc" stroke="#1f2937"/>
    <circle cx="74" cy="270" r="15" fill="#2563eb"/><text x="74" y="275" text-anchor="middle" class="badge">2</text>
    <text x="104" y="264" class="boxTitle">Argon2id derives wrapKey</text>
    <text x="104" y="284" class="boxText">phrase + salt + memory cost + ops cost</text>
    <text x="104" y="302" class="boxText">→ wrapKey</text>

    <rect x="40" y="335" width="450" height="96" rx="10" fill="#f8fafc" stroke="#1f2937"/>
    <circle cx="74" cy="373" r="15" fill="#2563eb"/><text x="74" y="378" text-anchor="middle" class="badge">3</text>
    <text x="104" y="366" class="boxTitle">Generate vault randomness</text>
    <text x="104" y="388" class="boxText">salt · wrap nonce · content nonce</text>
    <text x="104" y="406" class="boxText">random vaultKey</text>

    <rect x="40" y="451" width="450" height="82" rx="10" fill="#f8fafc" stroke="#1f2937"/>
    <circle cx="74" cy="488" r="15" fill="#2563eb"/><text x="74" y="493" text-anchor="middle" class="badge">4</text>
    <text x="104" y="482" class="boxTitle">Build AAD metadata</text>
    <text x="104" y="502" class="boxText">Canonical metadata is bound into the seal.</text>
    <text x="104" y="520" class="boxText">Schema, KDF settings, nonces, mode.</text>

    <rect x="40" y="553" width="450" height="82" rx="10" fill="#f8fafc" stroke="#1f2937"/>
    <circle cx="74" cy="590" r="15" fill="#2563eb"/><text x="74" y="595" text-anchor="middle" class="badge">5</text>
    <text x="104" y="584" class="boxTitle">Wrap vaultKey</text>
    <text x="104" y="604" class="boxText">XChaCha20-Poly1305 encrypts vaultKey</text>
    <text x="104" y="622" class="boxText">using wrapKey + AAD + wrap nonce.</text>

    <rect x="40" y="655" width="450" height="82" rx="10" fill="#f8fafc" stroke="#1f2937"/>
    <circle cx="74" cy="692" r="15" fill="#2563eb"/><text x="74" y="697" text-anchor="middle" class="badge">6</text>
    <text x="104" y="686" class="boxTitle">Encrypt record content</text>
    <text x="104" y="706" class="boxText">XChaCha20-Poly1305 encrypts plaintext</text>
    <text x="104" y="724" class="boxText">using vaultKey + AAD + content nonce.</text>
  </g>

  <g stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)">
    <line x1="265" y1="213" x2="265" y2="233"/>
    <line x1="265" y1="315" x2="265" y2="335"/>
    <line x1="265" y1="431" x2="265" y2="451"/>
    <line x1="265" y1="533" x2="265" y2="553"/>
    <line x1="265" y1="635" x2="265" y2="655"/>
  </g>

  <!-- Center panel -->
  <path d="M610 148 H975 L1040 214 V660 H610 Z" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <path d="M975 148 V214 H1040" fill="none" stroke="#111827" stroke-width="2"/>
  <rect x="640" y="170" width="90" height="38" rx="7" fill="#2563eb"/>
  <text x="685" y="195" text-anchor="middle" class="badge" style="font-size:20px">.vault</text>

  <text x="640" y="245" class="code">{</text>
  <text x="665" y="278" class="code">schema: "BRY-NFET-SX-VAULT-V2",</text>
  <text x="665" y="309" class="code">created_at, mode, version,</text>
  <text x="665" y="340" class="code">kdf: { algorithm, opslimit, memlimit, salt },</text>
  <text x="665" y="371" class="code">wrap: { algorithm, nonce, wrapped_key },</text>
  <text x="665" y="402" class="code">content: { algorithm, nonce, ciphertext }</text>
  <text x="640" y="433" class="code">}</text>

  <rect x="640" y="476" width="360" height="88" rx="10" fill="#f8fbff" stroke="#2563eb"/>
  <text x="664" y="508" class="note">AAD protects metadata too.</text>
  <text x="664" y="532" class="boxText">If protected fields change, decryption should fail.</text>
  <text x="664" y="552" class="boxText">That includes the schema and nonce-bound structure.</text>

  <rect x="640" y="584" width="360" height="88" rx="10" fill="#f0fdf4" stroke="#15803d"/>
  <text x="664" y="616" class="note" fill="#166534">Two-lock design.</text>
  <text x="664" y="640" class="boxText">phrase → wrapKey → vaultKey → message</text>
  <text x="664" y="660" class="boxText">The phrase never directly decrypts the content.</text>

  <!-- Right boxes -->
  <g>
    <rect x="1110" y="145" width="450" height="68" rx="10" fill="#f8fafc" stroke="#1f2937"/>
    <circle cx="1144" cy="179" r="15" fill="#2563eb"/><text x="1144" y="184" text-anchor="middle" class="badge">1</text>
    <text x="1174" y="174" class="boxTitle">Load and validate vault</text>
    <text x="1174" y="194" class="boxText">Check schema, required fields, and structure.</text>

    <rect x="1110" y="233" width="450" height="82" rx="10" fill="#f8fafc" stroke="#1f2937"/>
    <circle cx="1144" cy="270" r="15" fill="#2563eb"/><text x="1144" y="275" text-anchor="middle" class="badge">2</text>
    <text x="1174" y="264" class="boxTitle">Decode stored fields</text>
    <text x="1174" y="284" class="boxText">Read salt, nonces, wrapped_key, ciphertext.</text>
    <text x="1174" y="302" class="boxText">Rebuild the canonical metadata view.</text>

    <rect x="1110" y="335" width="450" height="82" rx="10" fill="#f8fafc" stroke="#1f2937"/>
    <circle cx="1144" cy="372" r="15" fill="#2563eb"/><text x="1144" y="377" text-anchor="middle" class="badge">3</text>
    <text x="1174" y="366" class="boxTitle">Derive wrapKey again</text>
    <text x="1174" y="386" class="boxText">Argon2id uses the same phrase and stored salt.</text>
    <text x="1174" y="404" class="boxText">Same costs must reproduce the same wrapKey.</text>

    <rect x="1110" y="437" width="450" height="82" rx="10" fill="#f8fafc" stroke="#1f2937"/>
    <circle cx="1144" cy="474" r="15" fill="#2563eb"/><text x="1144" y="479" text-anchor="middle" class="badge">4</text>
    <text x="1174" y="468" class="boxTitle">Unwrap vaultKey</text>
    <text x="1174" y="488" class="boxText">XChaCha20-Poly1305 unwraps vaultKey</text>
    <text x="1174" y="506" class="boxText">using wrapKey + AAD + wrap nonce.</text>

    <rect x="1110" y="539" width="450" height="82" rx="10" fill="#f8fafc" stroke="#1f2937"/>
    <circle cx="1144" cy="576" r="15" fill="#2563eb"/><text x="1144" y="581" text-anchor="middle" class="badge">5</text>
    <text x="1174" y="570" class="boxTitle">Decrypt content</text>
    <text x="1174" y="590" class="boxText">XChaCha20-Poly1305 decrypts ciphertext</text>
    <text x="1174" y="608" class="boxText">using vaultKey + AAD + content nonce.</text>

    <rect x="1110" y="641" width="450" height="96" rx="10" fill="#f0fdf4" stroke="#15803d"/>
    <circle cx="1144" cy="679" r="15" fill="#15803d"/><text x="1144" y="684" text-anchor="middle" class="badge">6</text>
    <text x="1174" y="672" class="boxTitle" fill="#166534">Recover plaintext</text>
    <text x="1174" y="694" class="boxText">If phrase and metadata match, the record opens.</text>
    <text x="1174" y="714" class="boxText">If not, authentication should fail.</text>
  </g>

  <g stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)">
    <line x1="1335" y1="213" x2="1335" y2="233"/>
    <line x1="1335" y1="315" x2="1335" y2="335"/>
    <line x1="1335" y1="417" x2="1335" y2="437"/>
    <line x1="1335" y1="519" x2="1335" y2="539"/>
    <line x1="1335" y1="621" x2="1335" y2="641"/>
  </g>

  <rect x="1240" y="742" width="240" height="44" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="1260" y="770" class="boxText" fill="#9a3412">Wrong phrase or tampering → fail</text>

  <rect x="290" y="785" width="1020" height="44" rx="12" fill="#ffffff" stroke="#2563eb"/>
  <text x="800" y="813" text-anchor="middle" class="summary">Phrase derives wrapKey. wrapKey unwraps vaultKey. vaultKey decrypts the message. AAD binds the vault metadata.</text>
</svg>
