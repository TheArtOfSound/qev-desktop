<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
<title id="title">QEV Encryption and Decryption Flow</title>
<desc id="desc">Step-by-step visual diagram showing QEV encryption, the vault file, and decryption.</desc>
<rect width="1400" height="900" fill="#fff"/>
<style>text{font-family:Inter,Arial,sans-serif;fill:#111827}.h{font-size:42px;font-weight:900}.sub{font-size:23px;font-weight:800;fill:#555}.s{font-size:25px;font-weight:900}.t{font-size:18px;font-weight:850}.m{font-size:13px;fill:#374151}.code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:16px}.n{font-size:15px;font-weight:900;fill:#fff}.sum{font-size:22px;font-weight:850}</style>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1554b7"/></marker></defs>
<text x="700" y="44" text-anchor="middle" class="h">QEV Encryption and Decryption Flow</text><text x="700" y="78" text-anchor="middle" class="sub">BRY-NFET-SX-VAULT-V2</text>
<line x1="455" y1="95" x2="455" y2="790" stroke="#1554b7" stroke-width="2" stroke-dasharray="7 9" opacity=".45"/><line x1="935" y1="95" x2="935" y2="790" stroke="#1554b7" stroke-width="2" stroke-dasharray="7 9" opacity=".45"/>
<text x="225" y="120" text-anchor="middle" class="s">ENCRYPTION</text><text x="700" y="120" text-anchor="middle" class="s">QEV VAULT FILE</text><text x="1165" y="120" text-anchor="middle" class="s">DECRYPTION</text>
<g id="enc">
<rect x="45" y="145" width="365" height="55" rx="10" fill="#f8fafc" stroke="#1f2937"/><circle cx="75" cy="172" r="15" fill="#1554b7"/><text x="75" y="178" text-anchor="middle" class="n">1</text><text x="105" y="169" class="t">Plaintext message</text><text x="105" y="190" class="m">important proof</text>
<rect x="45" y="218" width="365" height="55" rx="10" fill="#f8fafc" stroke="#1f2937"/><circle cx="75" cy="245" r="15" fill="#1554b7"/><text x="75" y="251" text-anchor="middle" class="n">2</text><text x="105" y="242" class="t">User phrase</text><text x="105" y="263" class="m">my long secret phrase</text>
<rect x="45" y="291" width="365" height="70" rx="10" fill="#f8fafc" stroke="#1f2937"/><circle cx="75" cy="318" r="15" fill="#1554b7"/><text x="75" y="324" text-anchor="middle" class="n">3</text><text x="105" y="315" class="t">Argon2id</text><text x="105" y="337" class="m">phrase + salt + opslimit + memlimit → wrapKey</text>
<rect x="45" y="379" width="365" height="100" rx="10" fill="#f8fafc" stroke="#1f2937"/><circle cx="75" cy="406" r="15" fill="#1554b7"/><text x="75" y="412" text-anchor="middle" class="n">4</text><text x="105" y="403" class="t">Generate randomness</text><text x="105" y="426" class="m">16-byte salt · 24-byte wrap nonce</text><text x="105" y="446" class="m">24-byte content nonce</text><text x="105" y="466" class="m">32-byte random vaultKey</text>
<rect x="45" y="497" width="365" height="70" rx="10" fill="#f8fafc" stroke="#1f2937"/><circle cx="75" cy="524" r="15" fill="#1554b7"/><text x="75" y="530" text-anchor="middle" class="n">5</text><text x="105" y="521" class="t">Build vault skeleton</text><text x="105" y="543" class="m">schema · version · created_at · mode · kdf · wrap · content</text>
<rect x="45" y="585" width="365" height="55" rx="10" fill="#f8fafc" stroke="#1f2937"/><circle cx="75" cy="612" r="15" fill="#1554b7"/><text x="75" y="618" text-anchor="middle" class="n">6</text><text x="105" y="609" class="t">Build AAD</text><text x="105" y="630" class="m">canonical sorted JSON metadata</text>
<rect x="45" y="658" width="365" height="75" rx="10" fill="#f8fafc" stroke="#1f2937"/><circle cx="75" cy="685" r="15" fill="#1554b7"/><text x="75" y="691" text-anchor="middle" class="n">7</text><text x="105" y="682" class="t">Wrap layer</text><text x="105" y="704" class="m">encrypt(vaultKey, AAD, wrapNonce, wrapKey)</text><text x="105" y="724" class="m">→ wrapped_key</text>
<rect x="45" y="751" width="365" height="75" rx="10" fill="#f8fafc" stroke="#1f2937"/><circle cx="75" cy="778" r="15" fill="#1554b7"/><text x="75" y="784" text-anchor="middle" class="n">8</text><text x="105" y="775" class="t">Content layer</text><text x="105" y="797" class="m">encrypt(plaintext, AAD, contentNonce, vaultKey)</text><text x="105" y="817" class="m">→ ciphertext</text>
</g>
<g stroke="#1554b7" stroke-width="3" marker-end="url(#a)"><line x1="228" y1="200" x2="228" y2="218"/><line x1="228" y1="273" x2="228" y2="291"/><line x1="228" y1="361" x2="228" y2="379"/><line x1="228" y1="479" x2="228" y2="497"/><line x1="228" y1="567" x2="228" y2="585"/><line x1="228" y1="640" x2="228" y2="658"/><line x1="228" y1="733" x2="228" y2="751"/><line x1="410" y1="696" x2="475" y2="696"/><line x1="410" y1="790" x2="475" y2="790"/></g>
<path d="M505 160 H800 L870 230 V720 H505 Z" fill="#fff" stroke="#111827" stroke-width="2.2"/><path d="M800 160 V230 H870" fill="none" stroke="#111827" stroke-width="2.2"/><rect x="525" y="180" width="92" height="40" rx="6" fill="#1554b7"/><text x="571" y="207" text-anchor="middle" font-size="22" font-weight="900" fill="#fff">.vault</text>
<text x="525" y="275" class="code">{</text><text x="525" y="305" class="code" fill="#1554b7"> schema: "BRY-NFET-SX-VAULT-V2",</text><text x="525" y="335" class="code"> version, created_at, mode,</text><text x="525" y="365" class="code"> kdf: { algorithm: "argon2id", salt },</text><text x="525" y="395" class="code"> wrap: { algorithm: "XChaCha20-Poly1305",</text><text x="525" y="425" class="code">         nonce, wrapped_key },</text><text x="525" y="455" class="code"> content: { algorithm: "XChaCha20-Poly1305",</text><text x="525" y="485" class="code">           nonce, ciphertext }</text><text x="525" y="515" class="code">}</text>
<rect x="520" y="745" width="340" height="72" rx="14" fill="#f8fbff" stroke="#1554b7" stroke-width="2"/><text x="545" y="785" font-size="30">🛡</text><text x="590" y="778" font-size="17" font-weight="800">AAD protects metadata too</text><text x="590" y="801" class="m">changing protected labels or nonces breaks decryption</text>
<g id="dec">
<rect x="980" y="145" width="365" height="55" rx="10" fill="#f8fafc" stroke="#1f2937"/><circle cx="1010" cy="172" r="15" fill="#1554b7"/><text x="1010" y="178" text-anchor="middle" class="n">1</text><text x="1040" y="169" class="t">Load .vault JSON</text>
<rect x="980" y="218" width="365" height="85" rx="10" fill="#f8fafc" stroke="#1f2937"/><circle cx="1010" cy="245" r="15" fill="#1554b7"/><text x="1010" y="251" text-anchor="middle" class="n">2</text><text x="1040" y="242" class="t">Validate vault schema</text><text x="1040" y="264" class="m">schema = BRY-NFET-SX-VAULT-V2</text><text x="1040" y="284" class="m">required fields + algorithms + lengths valid</text>
<rect x="980" y="321" width="365" height="70" rx="10" fill="#f8fafc" stroke="#1f2937"/><circle cx="1010" cy="348" r="15" fill="#1554b7"/><text x="1010" y="354" text-anchor="middle" class="n">3</text><text x="1040" y="345" class="t">Decode stored fields</text><text x="1040" y="367" class="m">salt, nonces, wrapped_key, ciphertext</text>
<rect x="980" y="409" width="365" height="70" rx="10" fill="#f8fafc" stroke="#1f2937"/><circle cx="1010" cy="436" r="15" fill="#1554b7"/><text x="1010" y="442" text-anchor="middle" class="n">4</text><text x="1040" y="433" class="t">Rebuild wrapKey</text><text x="1040" y="455" class="m">Argon2id(phrase, salt, opslimit, memlimit)</text>
<rect x="980" y="497" width="365" height="55" rx="10" fill="#f8fafc" stroke="#1f2937"/><circle cx="1010" cy="524" r="15" fill="#1554b7"/><text x="1010" y="530" text-anchor="middle" class="n">5</text><text x="1040" y="521" class="t">Rebuild AAD</text><text x="1040" y="542" class="m">same canonical metadata</text>
<rect x="980" y="570" width="365" height="75" rx="10" fill="#f8fafc" stroke="#1f2937"/><circle cx="1010" cy="597" r="15" fill="#1554b7"/><text x="1010" y="603" text-anchor="middle" class="n">6</text><text x="1040" y="594" class="t">Unwrap vaultKey</text><text x="1040" y="616" class="m">decrypt(wrapped_key, AAD, wrapNonce, wrapKey)</text>
<rect x="980" y="663" width="365" height="75" rx="10" fill="#f8fafc" stroke="#1f2937"/><circle cx="1010" cy="690" r="15" fill="#1554b7"/><text x="1010" y="696" text-anchor="middle" class="n">7</text><text x="1040" y="687" class="t">Decrypt content</text><text x="1040" y="709" class="m">decrypt(ciphertext, AAD, contentNonce, vaultKey)</text>
<rect x="980" y="756" width="365" height="55" rx="10" fill="#f8fafc" stroke="#1f2937"/><circle cx="1010" cy="783" r="15" fill="#1554b7"/><text x="1010" y="789" text-anchor="middle" class="n">8</text><text x="1040" y="780" class="t">UTF-8 decode plaintext</text><rect x="980" y="828" width="365" height="45" rx="10" fill="#f0fdf4" stroke="#15803d"/><text x="1010" y="858" font-size="26" fill="#15803d">✓</text><text x="1060" y="857" font-size="22" font-weight="900" fill="#15803d">important proof</text>
</g>
<g stroke="#1554b7" stroke-width="3" marker-end="url(#a)"><line x1="1162" y1="200" x2="1162" y2="218"/><line x1="1162" y1="303" x2="1162" y2="321"/><line x1="1162" y1="391" x2="1162" y2="409"/><line x1="1162" y1="479" x2="1162" y2="497"/><line x1="1162" y1="552" x2="1162" y2="570"/><line x1="1162" y1="645" x2="1162" y2="663"/><line x1="1162" y1="738" x2="1162" y2="756"/><line x1="1162" y1="811" x2="1162" y2="828"/></g>
<rect x="1248" y="585" width="130" height="58" rx="8" fill="#fff" stroke="#dc2626"/><text x="1260" y="609" fill="#dc2626" font-size="13" font-weight="850">Fail: wrong phrase</text><text x="1260" y="628" fill="#dc2626" font-size="13" font-weight="850">or tampered vault</text><rect x="1248" y="680" width="130" height="50" rx="8" fill="#fff" stroke="#dc2626"/><text x="1260" y="705" fill="#dc2626" font-size="13" font-weight="850">Fail: content</text><text x="1260" y="724" fill="#dc2626" font-size="13" font-weight="850">tampered</text>
<rect x="75" y="840" width="770" height="44" rx="14" fill="#fff" stroke="#1554b7" stroke-width="2"/><text x="100" y="868" class="sum">Two-lock vault: phrase → wrapKey → vaultKey → message. AAD binds the vault label into the seal.</text>
</svg>